name: Opportunity Bot

on:
  # Roz subah 8 AM aur shaam 6 PM IST pe chalega (UTC mein: 2:30 AM aur 12:30 PM)
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST
    - cron: '30 12 * * *'  # 6:00 PM IST

  # Manual run bhi kar sakte ho (Actions tab se)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Opportunity Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/opportunity_bot.py

      - name: Commit updated seen list
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/seen.json
          git diff --cached --quiet || git commit -m "bot: update seen opportunities $(date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push
